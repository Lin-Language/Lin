[package]
name = "lin-runtime"
version = "0.1.0"
edition = "2021"

[lib]
name = "lin_runtime"
crate-type = ["staticlib", "rlib"]

[dependencies]
serde_json = { version = "1", default-features = false, features = ["std"] }
ureq = { workspace = true }
libc = "0.2"
serde_yml = "0.0.13"
jaq-core = "3.0.0"
jaq-std = "3.0.0"
jaq-json = "2.0.0"
