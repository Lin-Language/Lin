name: Build binaries

# Reusable workflow: builds the release binaries + platform VSIX for every
# supported target, packages them as `${artifact}.tar.gz` + `.vsix`, and uploads
# them as workflow artifacts so the caller can download/attach them.
#
# Callers:
#   - release.yml        passes a commit-count-derived stamp (rolling `latest`)
#   - release-plz.yml     passes the released semver version (stable tag)
on:
  workflow_call:
    inputs:
      version_stamp:
        description: "Version string to stamp into the VSIX package.json (e.g. 1.0.0 or 0.x.123)."
        type: string
        required: true
      release_kind:
        description: "Free-form label for the build (e.g. 'latest' or 'stable'); informational only."
        type: string
        required: false
        default: "latest"

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: lin-linux-x86_64
            vsix_platform: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lin-macos-arm64
            vsix_platform: darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git rev-list --count

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22 || brew install llvm
          PREFIX=$(brew --prefix llvm@22 2>/dev/null || brew --prefix llvm)
          echo "LLVM_SYS_221_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "${PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: |
          cargo build --release -p lin --target ${{ matrix.target }}
          cargo build --release -p lin-lsp --target ${{ matrix.target }}
          cargo build --release -p lin-runtime --target ${{ matrix.target }}

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/lin
          strip target/${{ matrix.target }}/release/lin-lsp

      - name: Package compiler tarball
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/lin dist/lin
          cp target/${{ matrix.target }}/release/lin-lsp dist/lin-lsp
          cp target/${{ matrix.target }}/release/liblin_runtime.a dist/liblin_runtime.a
          cd dist && tar -czf ../${{ matrix.artifact }}.tar.gz lin lin-lsp liblin_runtime.a

      - name: Package platform-specific VSIX
        env:
          VERSION_STAMP: ${{ inputs.version_stamp }}
        run: |
          mkdir -p editors/vscode/bin/${{ matrix.vsix_platform }}
          cp target/${{ matrix.target }}/release/lin              editors/vscode/bin/${{ matrix.vsix_platform }}/lin
          cp target/${{ matrix.target }}/release/lin-lsp          editors/vscode/bin/${{ matrix.vsix_platform }}/lin-lsp
          cp target/${{ matrix.target }}/release/liblin_runtime.a editors/vscode/bin/${{ matrix.vsix_platform }}/liblin_runtime.a
          cp logo.png editors/vscode/icon.png
          cd editors/vscode
          npm install
          # Stamp the version passed by the caller so the marketplace never sees a duplicate.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = process.env.VERSION_STAMP;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npx @vscode/vsce package \
            --target ${{ matrix.vsix_platform }} \
            -o ../../lin-lang-${{ matrix.vsix_platform }}.vsix

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: editors/vscode
        run: |
          npx @vscode/vsce publish \
            --no-dependencies \
            --packagePath ../../lin-lang-${{ matrix.vsix_platform }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            lin-lang-${{ matrix.vsix_platform }}.vsix
