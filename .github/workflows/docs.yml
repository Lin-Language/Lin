name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Build-only CI check: confirms the Lin-written docs generator still compiles and
# runs. The site is DEPLOYED from the Lin-Language.github.io repo (the org root
# site at https://lin-language.github.io), whose workflow checks this repo out and
# builds it — see that repo's .github/workflows. This job does not publish Pages.
jobs:
  build:
    name: Build docs (check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Lin compiler
        run: cargo build --workspace

      - name: Build the docs generator (written in Lin)
        run: ./target/debug/lin build docs-site/builder/main.lin -o docs-builder

      - name: Generate the static site
        run: ./docs-builder

      - name: Upload generated site (artifact, for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site/output
