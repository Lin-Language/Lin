name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # Compute the rolling-`latest` VSIX version stamp. Shell can't run inside a
  # reusable workflow's `with:` block, so derive the stamp here and pass it on.
  # Preserves the major.minor from editors/vscode/package.json and uses the
  # commit count as the patch, so the marketplace never sees a duplicate.
  prep:
    name: Compute version stamp
    runs-on: ubuntu-latest
    outputs:
      version_stamp: ${{ steps.stamp.outputs.version_stamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git rev-list --count
      - id: stamp
        run: |
          MAJOR_MINOR=$(node -e "const p=require('./editors/vscode/package.json');const a=p.version.split('.');console.log(a[0]+'.'+a[1]);")
          PATCH=$(git rev-list --count HEAD)
          echo "version_stamp=${MAJOR_MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  build:
    name: Build binaries
    needs: prep
    uses: ./.github/workflows/build-binaries.yml
    with:
      version_stamp: ${{ needs.prep.outputs.version_stamp }}
      release_kind: latest
    secrets: inherit

  release:
    name: Publish "latest" pre-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish "latest" release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          BUILT_AT: ${{ github.event.head_commit.timestamp }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES'
          Automated build from `master`.

          **Commit:** ${COMMIT_SHA}
          **Built:** ${BUILT_AT}

          ## Installation

          Download the archive for your platform, extract, and place `lin` on your `$PATH`.

          > **Note:** The Linux binary requires `clang` (or any C linker) to link compiled programs.
          > No LLVM installation needed — LLVM is bundled inside `lin`.

          ## VS Code Extension

          Download the `.vsix` for your platform and install with:
          ```bash
          code --install-extension lin-lang-<platform>.vsix
          ```

          Or install directly from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=LinusN.lin-lang).
          NOTES

          # Substitute env vars into the notes file
          sed -i "s|\${COMMIT_SHA}|${COMMIT_SHA}|g; s|\${BUILT_AT}|${BUILT_AT}|g" /tmp/release-notes.md

          gh release delete latest --repo ${{ github.repository }} --yes --cleanup-tag || true
          sleep 3
          gh release create latest dist/* \
            --repo ${{ github.repository }} \
            --title "Latest build" \
            --prerelease \
            --notes-file /tmp/release-notes.md
